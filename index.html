<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>secRetrecIPe🍋🍳</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #FFFDE7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            background-color: #FFFFFF;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(230, 168, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #FFF44F;
        }

        h2 {
            color: #E6A800;
            margin-bottom: 25px;
            font-size: 2rem;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #E6A800;
            box-shadow: 0 0 5px rgba(230, 168, 0, 0.3);
        }

        button {
            width: 100%;
            background-color: #FFF44F;
            color: #333;
            border: 2px solid #E6A800;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #FFC107;
        }

        button:disabled {
            background-color: #e0e0e0;
            border-color: #ccc;
            cursor: not-allowed;
        }

        #loadingMsg {
            display: none;
            color: #888;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* เพิ่ม CSS สำหรับข้อความเตือนรหัสผิด */
        #errorMessage {
            display: none;
            color: red;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ลงทะเบียน / เข้าสู่ระบบ 🍳</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" name="username" required placeholder="ใส่ชื่อของคุณ">
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" required placeholder="ใส่รหัสผ่าน">
            </div>

            <div class="input-group">
                <label for="gmail">อีเมล (Gmail)</label>
                <input type="email" id="gmail" name="gmail" required placeholder="example@gmail.com">
            </div>

            <div class="input-group">
                <label for="allergies">อาหารที่แพ้ / ไม่ทาน (ถ้ามี)</label>
                <input type="text" id="allergies" name="allergies" placeholder="เช่น กุ้ง, ถั่วลิสง, ไม่กินเผ็ด">
            </div>

            <button type="submit">ไปหน้าสุ่มอาหาร!</button>
            <p id="errorMessage">รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง ❌</p>
            <p id="loadingMsg">กำลังบันทึกข้อมูลและเข้าสู่ระบบ... ⏳</p>
            <div style="margin-top: 15px;">
                <a href="#" onclick="forgotPassword()" style="color: #E6A800; font-size: 0.9rem; text-decoration: underline; font-weight: 600;">ลืมรหัสผ่านใช่ไหม?</a>
            </div>
        </form>
    </div>

    <script>
        // URL ไปยัง Google Apps Script ของคุณ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxG88mZ_NbPpDQzF3npXLuiF2o1Rz_jbTQteMKyNdHOB_p7wMi8Wc9hZqY30B1A_z3A/exec'; 

        const form = document.getElementById('loginForm');
        const loadingMsg = document.getElementById('loadingMsg');
        const errorMsg = document.getElementById('errorMessage');
        const submitBtn = form.querySelector('button');

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            errorMsg.style.display = 'none'; // ซ่อนข้อความสีแดงไว้ก่อนเสมอ

            const emailInput = document.getElementById('gmail').value;
            const passwordInput = document.getElementById('password').value;
            const usernameInput = document.getElementById('username').value;
            const allergiesInput = document.getElementById('allergies').value;

            // === 1. ระบบตรวจเช็ครหัสผ่าน ===
            let usersDatabase = JSON.parse(localStorage.getItem('usersDatabase')) || {};

            if (usersDatabase[emailInput]) {
                // ถ้ามีอีเมลนี้อยู่แล้ว ให้เช็ครหัสผ่าน
                if (usersDatabase[emailInput].password !== passwordInput) {
                    errorMsg.style.display = 'block'; // โชว์ข้อความรหัสผิด
                    return; // เบรกการทำงานตรงนี้ ไม่ส่งข้อมูลไป Google Sheets
                }
            } else {
                // ถ้าเป็นผู้ใช้ใหม่ ให้บันทึกลงฐานข้อมูลจำลอง
                usersDatabase[emailInput] = {
                    password: passwordInput,
                    username: usernameInput,
                    allergies: allergiesInput
                };
                localStorage.setItem('usersDatabase', JSON.stringify(usersDatabase));
            }

            // === 2. ผ่านการเช็ครหัสผ่าน ให้ส่งข้อมูลไป Google Sheets ===
            loadingMsg.style.display = 'block';
            submitBtn.disabled = true;

            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form),
                mode: 'no-cors' 
            })
            .then(response => {
                // บันทึกสถานะผู้ใช้งานเข้าเครื่อง
                localStorage.setItem('currentUser', usernameInput);
                
                // ดึงข้อมูลอาหารที่แพ้มาใช้งาน (ถ้าล็อกอินเก่าให้ใช้ของเก่า ถ้าใหม่ใช้ของใหม่)
                const currentAllergy = allergiesInput || usersDatabase[emailInput].allergies || '';
                localStorage.setItem('userAllergies', currentAllergy);
                
                // เปลี่ยนไปหน้า main.html
                window.location.href = 'main.html';
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
                loadingMsg.style.display = 'none';
                submitBtn.disabled = false;
            });
        });

        // ฟังก์ชันลืมรหัสผ่าน (ฉบับฐานข้อมูลจำลอง)
        function forgotPassword() {
            // เด้งหน้าต่างเล็กๆ ขึ้นมาถามอีเมล
            const emailToCheck = prompt("กรุณากรอกอีเมลที่ใช้สมัคร เพื่อกู้คืนรหัสผ่าน 🕵️‍♂️:");
            
            if (emailToCheck) {
                // ดึงฐานข้อมูลจำลองมาค้นหา
                let usersDatabase = JSON.parse(localStorage.getItem('usersDatabase')) || {};
                
                if (usersDatabase[emailToCheck]) {
                    // ถ้าเจออีเมล ให้แอบบอกรหัสผ่าน
                    alert(`รหัสผ่านของคุณคือ: ${usersDatabase[emailToCheck].password} 🤫 (รู้แล้วเหยียบไว้เลยนะ!)`);
                } else {
                    // ถ้าไม่เจอ
                    alert("ไม่พบอีเมลนี้ในระบบครับ ลองนึกดูดีๆ อีกทีน้า 🧐");
                }
            }
        }
    </script>
</body>
</html>
